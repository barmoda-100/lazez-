<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | مطعم لذيذ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1544145945-f904253d0c7b?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            padding: 20px;
        }

        /* حاوية التسجيل (بدون الصورة الجانبية) */
        .main-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 500px; /* تقليص العرض ليناسب الواجهة المنفردة */
            max-width: 100%;
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-section {
            padding: 40px 45px;
            text-align: center;
        }

        .header-box img { width: 60px; margin-bottom: 15px; }
        h2 { color: #2d3436; margin: 0; font-size: 26px; }
        p { color: #636e72; font-size: 14px; margin-bottom: 30px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            outline: none;
            background: #f9f9f9;
        }
        input:focus { border-color: #ff4757; background: #fff; box-shadow: 0 4px 10px rgba(255,71,87,0.1); }

        .full-width { grid-column: span 2; }
        @media (max-width: 480px) { .full-width { grid-column: span 1; } }

        .reg-btn {
            width: 100%;
            padding: 14px;
            border: none;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .reg-btn:hover { transform: scale(1.02); box-shadow: 0 8px 15px rgba(255,71,87,0.3); }

        .social-text { margin: 25px 0 15px; color: #a4b0be; font-size: 12px; display: flex; align-items: center; }
        .social-text::before, .social-text::after { content: ""; flex: 1; height: 1px; background: #eee; margin: 0 10px; }

        .social-icons { display: flex; justify-content: center; gap: 20px; }
        .icon-circle {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 1px solid #eee;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer;
        }

        /* --- واجهة المنيو (مخفية) --- */
        #menu-section {
            display: none;
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            animation: fadeIn 0.8s ease;
        }

        .menu-header { text-align: center; margin-bottom: 40px; }
        .menu-header h1 { color: #2d3436; font-size: 32px; margin-bottom: 10px; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .food-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid #f1f2f6;
        }
        .food-card img { width: 100%; height: 180px; object-fit: cover; }
        .food-info { padding: 20px; text-align: center; }
        .food-info h3 { margin: 0 0 10px; color: #2d3436; }
        .food-info .price { color: #ff4757; font-size: 1.2rem; font-weight: bold; }
        
        .order-btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border: 1.5px solid #ff4757;
            background: transparent;
            color: #ff4757;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .order-btn:hover { background: #ff4757; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="main-container" id="auth-container">
        <div class="register-section">
            <div class="header-box">
                <img src="https://cdn-icons-png.flaticon.com/512/1046/1046771.png" alt="logo">
                <h2>حساب جديد</h2> <p>سجل الآن للطلب من مطعم لذيذ</p>
            </div>

            <form id="regForm">
                <div class="form-grid">
                    <div class="input-group"><input type="text" placeholder="الاسم الأول" required></div>
                    <div class="input-group"><input type="text" placeholder="اسم العائلة" required></div>
                    <div class="input-group full-width"><input type="email" placeholder="البريد الإلكتروني" required></div>
                    <div class="input-group full-width"><input type="tel" placeholder="رقم الهاتف" required></div>
                    <div class="input-group"><input type="password" placeholder="كلمة المرور" required></div>
                    <div class="input-group"><input type="password" placeholder="تأكيد الكلمة" required></div>
                </div>
                <button type="submit" class="reg-btn">إنشاء الحساب</button>
            </form>

            <div class="social-text">أو التسجيل بواسطة</div>
            <div class="social-icons">
                <div class="icon-circle"><i class="fab fa-google"></i></div>
                <div class="icon-circle"><i class="fab fa-facebook-f"></i></div>
            </div>
            <p style="margin-top: 20px;">لديك حساب بالفعل؟ <a href="#" style="color: #ff4757; text-decoration: none; font-weight: bold;">دخول</a></p>
        </div>
    </div>

    <div id="menu-section">
        <div class="menu-header">
            <h1>قائمة مطعم لذيذ 🍔</h1>
            <p>نقدم لك أفضل الأطباق بأعلى جودة</p>
        </div>
        
        <div class="menu-grid">
            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500" alt="برجر">
                <div class="food-info">
                    <h3>برجر لحم فاخر</h3>
                    <div class="price">35 ريال</div>
                    <button class="order-btn">إضافة للسلة</button>
                </div>
            </div>

            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=500" alt="بيتزا">
                <div class="food-info">
                    <h3>بيتزا إيطالية</h3>
                    <div class="price">42 ريال</div>
                    <button class="order-btn">إضافة للسلة</button>
                </div>
            </div>

            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1541529086526-db283c563270?auto=format&fit=crop&w=500" alt="مشويات">
                <div class="food-info">
                    <h3>طبق مشويات</h3>
                    <div class="price">55 ريال</div>
                    <button class="order-btn">إضافة للسلة</button>
                </div>
            </div>

            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1544145945-f904253d0c7b?auto=format&fit=crop&w=500" alt="عصير">
                <div class="food-info">
                    <h3>عصير طازج</h3>
                    <div class="price">15 ريال</div>
                    <button class="order-btn">إضافة للسلة</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('auth-container').style.display = 'none';
            const menu = document.getElementById('menu-section');
            menu.style.display = 'block';
            document.body.style.background = "#f8f9fa";
            document.body.style.alignItems = "flex-start";
        });
    </script>
</body>
</html>
