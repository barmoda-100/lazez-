Enter<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | مطعم خيرات الشام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1544145945-f904253d0c7b?auto=format&fit=crop&w=1350&q=80'); /* خلفية عصائر طازجة */
            background-size: cover;
            background-position: center;
        }

        .main-container {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 900px;
            max-width: 95%;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* الجزء الأيمن: صورة جانبية ثابتة للفطائر */
        .side-image {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1593560708920-61dd98c46a4e?auto=format&fit=crop&w=600&q=80');
            background-size: cover;
            background-position: center;
            display: none;
        }

        @media (min-width: 768px) { .side-image { display: block; } }

        /* الجزء الأيسر: فورم التسجيل */
        .register-section {
            flex: 1.2;
            padding: 30px 45px;
            background: white;
            text-align: center;
        }

        .header-box img { width: 50px; margin-bottom: 10px; }
        h2 { color: #2d3436; margin: 0; font-size: 24px; }
        p { color: #636e72; font-size: 13px; margin-bottom: 25px; }

        /* تنسيق الحقول */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* حقلين بجانب بعض للشاشات الكبيرة */
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }

        .input-group { position: relative; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            outline: none;
            background: #f9f9f9;
            transition: 0.3s;
        }
        input:focus { border-color: #ff4757; background: #fff; box-shadow: 0 4px 10px rgba(255,71,87,0.1); }

        .full-width { grid-column: span 2; }
        @media (max-width: 480px) { .full-width { grid-column: span 1; } }

        .reg-btn {
            width: 100%;
            padding: 14px;
            border: none;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .reg-btn:hover { transform: scale(1.02); box-shadow: 0 8px 15px rgba(255,71,87,0.3); }

        /* أزرار التواصل الاجتماعي المصغرة */
        .social-text { margin: 20px 0 15px; color: #a4b0be; font-size: 12px; display: flex; align-items: center; }
        .social-text::before, .social-text::after { content: ""; flex: 1; height: 1px; background: #eee; margin: 0 10px; }

        .social-icons { display: flex; justify-content: center; gap: 20px; }
        .icon-circle {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 1px solid #eee;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; transition: 0.3s;
        }
        .icon-circle.google:hover { background: #db4437; color: white; border-color: #db4437; }
        .icon-circle.fb:hover { background: #4267B2; color: white; border-color: #4267B2; }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="side-image"></div>

        <div class="register-section">
            <div class="header-box">
                <img src="https://cdn-icons-png.flaticon.com/512/1046/1046771.png" alt="logo">
                <h2>عضوية جديدة</h2>
                <p>انضم إلينا واستمتع بخصم 15% على طلبك الأول!</p>
            </div>

            <form>
                <div class="form-grid">
                    <div class="input-group">
                        <input type="text" placeholder="الاسم الأول" required>
                    </div>
                    <div class="input-group">
                        <input type="text" placeholder="اسم العائلة" required>
                    </div>
                    <div class="input-group full-width">
                        <input type="email" placeholder="البريد الإلكتروني" required>
                    </div>
                    <div class="input-group full-width">
                        <input type="tel" placeholder="رقم الهاتف (مثال: 05xxxx)" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="كلمة المرور" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="تأكيد الكلمة" required>
                    </div>
                </div>

                <button type="submit" class="reg-btn">إنشاء حسابي</button>
            </form>

            <div class="social-text">أو التسجيل بواسطة</div>

            <div class="social-icons">
                <div class="icon-circle google"><i class="fab fa-google"></i></div>
                <div class="icon-circle fb"><i class="fab fa-facebook-f"></i></div>
            </div>

            <p style="margin-top: 20px;">
                لديك حساب بالفعل؟ <a href="#" style="color: #ff4757; text-decoration: none; font-weight: bold;">دخول</a>
            </p>
        </div>
    </div>

</body>
</html>
